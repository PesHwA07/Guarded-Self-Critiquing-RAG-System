name: Eval Gate - Quality Check

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ingest documents into ChromaDB
        run: python scripts/ingest.py

      # Smoke test on every push (10 queries, fast)
      - name: Run smoke evaluation
        if: github.event_name == 'push'
        run: |
          python scripts/run_eval.py \
            --mode smoke \
            --config data/eval_config.yaml \
            --output eval_report.json \
            --delay 2.0

      # Full evaluation on PR to main (all 101 queries, with rate limiting)
      - name: Run full evaluation
        if: github.event_name == 'pull_request'
        run: |
          python scripts/run_eval.py \
            --mode full \
            --config data/eval_config.yaml \
            --output eval_report.json \
            --delay 2.0

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_report.json
          retention-days: 30
